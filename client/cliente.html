<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciertos Carolina Arce</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
    <header>
        <h1>Venta de Entradas</h1>
        <button id="cart-btn" class="btn">Carrito (<span id="cart-count">0</span>)</button>
    </header>

    <main>
        <div id="main-view">
            <section class="filters">
                <input type="text" id="search-input" placeholder="Buscar evento...">
                <select id="city-filter">
                    <option value="">Todas las ciudades</option>
                    <option value="Santiago">Santiago</option>
                    <option value="Valparaíso">Valparaíso</option>
                </select>
                <select id="category-filter">
                    <option value="">Todas las categorías</option>
                </select>
            </section>
            
            <section id="events-grid" class="grid-container"></section>
        </div>

        <div id="event-detail-container" style="display: none;"></div>
    </main>

    <div id="cart-modal" style="display: none;" class="modal">
        <div class="modal-content">
            <button id="close-cart" class="btn">Cerrar Carrito</button>
            <h2>Tu Carrito</h2>
            <div id="cart-items"></div>
            <h3>Total: $<span id="cart-total">0</span></h3>
            
            <form id="checkout-form">
                <h3>Datos de Compra</h3>
                <input type="text" id="buyer-id" required placeholder="RUT / DNI">
                <input type="text" id="buyer-name" required placeholder="Nombre Completo">
                <input type="text" id="buyer-address" required placeholder="Dirección">
                <input type="text" id="buyer-phone" required placeholder="Teléfono">
                <input type="email" id="buyer-email" required placeholder="Correo Electrónico">
                <button type="submit" class="btn">Finalizar Compra</button>
            </form>
        </div>
    </div>

    <script src="../JS/storage.js"></script>
    <script src="../JS/components.js"></script>
    <script src="../JS/client.js"></script>
</body>
</html>
