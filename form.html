<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edición de Inmueble - Acme</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="https://via.placeholder.com/100x40?text=acme" alt="Logo Acme">
        </div>
        <h1>GESTIÓN DE INMUEBLES</h1>
        <div class="user-profile">
            <div class="user-info">
                <span>CINDY CAROLINA CHAVARRIA ARCE</span>
                <a href="#">Cerrar Sesión</a>
            </div>
            <div class="user-avatar"></div>
        </div>
    </header>

    <nav class="tabs">
        <a href="#" class="active">Inmuebles</a>
        <a href="#">Usuarios</a>
    </nav>

    <main class="container">
        <section class="form-card">
            <header class="form-header">
                <h2>Edición de Inmueble</h2>
                <button class="btn-close">×</button>
            </header>

            <div class="form-body">
                <div class="form-image">
                    <img src="https://via.placeholder.com/400x400" alt="Casa en edición">
                </div>

                <form class="form-fields">
                    <div class="input-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion">
                    </div>
                    <div class="input-group">
                        <label for="tipo">Tipo</label>
                        <select id="tipo" name="tipo">
                            <option value="">Seleccione...</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="ciudad">Ciudad</label>
                        <input type="text" id="ciudad" name="ciudad">
                    </div>
                    <div class="input-group">
                        <label for="departamento">Departamento</label>
                        <input type="text" id="departamento" name="departamento">
                    </div>
                    <div class="input-group">
                        <label for="matricula">Matrícula Inmobiliaria</label>
                        <input type="text" id="matricula" name="matricula">
                    </div>
                    <div class="input-group">
                        <label for="area">Área (m2)</label>
                        <input type="number" id="area" name="area">
                    </div>
                    <div class="input-group">
                        <label for="propietario">Propietario</label>
                        <input type="text" id="propietario" name="propietario">
                    </div>
                    <div class="input-group">
                        <label for="identificacion">Identificación propietario</label>
                        <input type="text" id="identificacion" name="identificacion">
                    </div>
                    <div class="input-group full-width">
                        <label for="valor">Valor del inmueble</label>
                        <input type="number" id="valor" name="valor">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="comercial" name="comercial">
                        <label for="comercial">Uso comercial</label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Guardar</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
